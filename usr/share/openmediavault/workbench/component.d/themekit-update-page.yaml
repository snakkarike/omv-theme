version: "1.0"
type: component
data:
  name: themekit-update-page
  type: formPage
  config:
    request:
      service: ThemeKit
      get:
        method: get
    fields:
      - type: textInput
        name: updateInfo
        label: _("Status")
        value: _("Option to update the plugin will be added here.")
        readonly: true
    buttons:
      - template: submit
        modifiers:
          - type: hidden
