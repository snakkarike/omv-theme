name: Build and publish release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.stage.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper build-essential

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Locate and stage build artifacts
        id: stage
        run: |
          set -e
          DEB_PATH=$(find .. -maxdepth 1 -name 'openmediavault-themekit_*_all.deb' | head -n1)
          if [ -z "$DEB_PATH" ]; then
            echo "No .deb produced by the build" >&2
            exit 1
          fi
          VERSION=$(dpkg-deb -f "$DEB_PATH" Version)
          mkdir -p dist
          cp "$DEB_PATH" "dist/openmediavault-themekit_${VERSION}_all.deb"
          cp "$DEB_PATH" "dist/openmediavault-themekit_all.deb"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package installability (offline check)
        run: |
          dpkg-deb -I "dist/openmediavault-themekit_all.deb"
          dpkg-deb -c "dist/openmediavault-themekit_all.deb" > /dev/null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThemeKit-Package
          path: dist/openmediavault-themekit_all.deb

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if the release already exists
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists. Updating files only to preserve release notes..."
          else
            echo "Creating new release ${{ github.ref_name }}..."
            gh release create ${{ github.ref_name }} --title "ThemeKit ${{ github.ref_name }}" --generate-notes
          fi

          # Upload files, overwriting existing ones if the tag was moved
          gh release upload ${{ github.ref_name }} \
            dist/openmediavault-themekit_${{ steps.stage.outputs.version }}_all.deb \
            dist/openmediavault-themekit_all.deb \
            --clobber

  publish-apt-repo:
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Install repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: ThemeKit-Package
          path: dist

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -e
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Checkout or create apt-repo branch
        env:
          REMOTE_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -e
          git config --global user.name "themekit-bot"
          git config --global user.email "actions@users.noreply.github.com"
          git clone --branch apt-repo --single-branch "$REMOTE_URL" apt-repo-checkout \
            || (mkdir apt-repo-checkout && cd apt-repo-checkout && git init -q \
                && git remote add origin "$REMOTE_URL" \
                && git checkout -q --orphan apt-repo && git commit -q --allow-empty -m "Initialize apt-repo branch")

      - name: Update pool and regenerate signed indices
        run: |
          set -e
          cd apt-repo-checkout
          mkdir -p pool/main dists/stable/main/binary-all

          # Keep only the newest build in the pool; dpkg-scanpackages only
          # indexes the latest version per package anyway, so older .debs
          # would just be dead weight sitting in git history.
          rm -f pool/main/openmediavault-themekit_*_all.deb
          cp "$GITHUB_WORKSPACE/dist/openmediavault-themekit_all.deb" \
             "pool/main/openmediavault-themekit_${{ needs.build-and-release.outputs.version }}_all.deb"

          dpkg-scanpackages --arch all pool/main /dev/null > dists/stable/main/binary-all/Packages
          gzip -kf dists/stable/main/binary-all/Packages

          cd dists/stable
          rm -f Release InRelease Release.gpg
          apt-ftparchive release . > Release
          gpg --default-key "${{ secrets.APT_GPG_KEY_EMAIL }}" --clearsign -o InRelease Release
          gpg --default-key "${{ secrets.APT_GPG_KEY_EMAIL }}" -abs -o Release.gpg Release

      - name: Publish public keyring
        run: |
          set -e
          gpg --armor --export "${{ secrets.APT_GPG_KEY_EMAIL }}" \
            > apt-repo-checkout/themekit-archive-keyring.asc
          gpg --dearmor < apt-repo-checkout/themekit-archive-keyring.asc \
            > apt-repo-checkout/themekit-archive-keyring.gpg

      - name: Commit and push apt-repo branch
        run: |
          set -e
          cd apt-repo-checkout
          git add -A
          git commit -m "Update apt repo for ${{ github.ref_name }}" || echo "Nothing to commit"
          git push origin apt-repo
